<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Tour - 400 Destinations</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* Header Styles */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* Search Bar */
        .search-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 30px;
            overflow: hidden;
        }

        .search-container input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .search-container button {
            background-color: #ff5a5f;
            color: white;
            border: none;
            padding: 0 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-container button:hover {
            background-color: #e0484d;
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-info {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: #666;
        }

        /* Places Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 20px;
        }

        .card-tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #222;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #222;
            color: #fff;
            margin-top: 60px;
            font-size: 0.9rem;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Explore The World Of Yours</h1>
        <p>Discover 400 Beautiful Destinations Across the Globe</p>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by place or country..." onkeyup="filterPlaces()">
            <button onclick="filterPlaces()">Search</button>
        </div>
    </header>

    <div class="container">
        <div class="stats-info" id="statsCounter">Loading destinations...</div>
        <div class="grid" id="placesGrid">
            </div>
    </div>

    <footer>
        <p>&copy; 2026 World Tour Explorer. Built with HTML, CSS, and Pure JavaScript.</p>
    </footer>

    <script>
        // 1. Database: Base Real Data (Aap isme aur badha sakte hain)
        const basePlaces = [
            { name: "Taj Mahal", country: "India", desc: "One of the Seven Wonders of the World, a beautiful white marble mausoleum in Agra.", img: "https://images.unsplash.com/photo-1564507592333-c60657eea523?auto=format&fit=crop&w=400&q=80" },
            { name: "Eiffel Tower", country: "France", desc: "An iconic wrought-iron lattice tower on the Champ de Mars in Paris.", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=400&q=80" },
            { name: "Kyoto Temples", country: "Japan", desc: "Famous for its classical Buddhist temples, gardens, imperial palaces, and traditional wooden houses.", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=400&q=80" },
            { name: "Colosseum", country: "Italy", desc: "An oval amphitheatre in the centre of the city of Rome, the largest ancient amphitheatre ever built.", img: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=400&q=80" },
            { name: "Grand Canyon", country: "USA", desc: "A powerful and inspiring landscape, the Grand Canyon overwhelms our senses through its immense size.", img: "https://images.unsplash.com/photo-1615551043360-33de8b5f410c?auto=format&fit=crop&w=400&q=80" },
            { name: "Machu Picchu", country: "Peru", desc: "An Incan citadel set high in the Andes Mountains in Peru, above the Urubamba River valley.", img: "https://images.unsplash.com/photo-1587595421260-30cc5a2ef724?auto=format&fit=crop&w=400&q=80" },
            { name: "Pyramids of Giza", country: "Egypt", desc: "Ancient pyramid shaped masonry structures located in Giza, legendary royal tombs.", img: "https://images.unsplash.com/photo-1539650116574-8efeb43e2750?auto=format&fit=crop&w=400&q=80" },
            { name: "Sydney Opera House", country: "Australia", desc: "A multi-venue performing arts centre in Sydney, located on the foreshore of Sydney Harbour.", img: "https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&w=400&q=80" },
            { name: "Santorini", country: "Greece", desc: "Famous for dramatic views, inspiring sunsets, and whitewashed houses with bright blue domes.", img: "https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&w=400&q=80" },
            { name: "Petra", country: "Jordan", desc: "A famous archaeological site in Jordan's southwestern desert, dating back to around 300 B.C.", img: "https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?auto=format&fit=crop&w=400&q=80" }
        ];

        // 2. Loop se Pure 400 Items generate karna taaki data automation ho sake
        const allPlaces = [];
        const targetCount = 400;

        for (let i = 0; i < targetCount; i++) {
            // Base data ko repeat karke alalag IDs aur names generate kar rahe hain
            const baseItem = basePlaces[i % basePlaces.length];
            allPlaces.push({
                id: i + 1,
                name: `${baseItem.name} Space-${i+1}`,
                country: baseItem.country,
                desc: `${baseItem.desc} This is listed as global destination number ${i+1} for travelers.`,
                img: baseItem.img
            });
        }

        // 3. Cards ko DOM (HTML) mein render karne ka function
        function displayPlaces(placesList) {
            const grid = document.getElementById('placesGrid');
            const counter = document.getElementById('statsCounter');
            
            // Grid ko clear karein
            grid.innerHTML = "";
            
            // Counter update karein
            counter.innerText = `Showing ${placesList.length} of ${targetCount} Global Destinations`;

            // Agar koi result nahi mila
            if(placesList.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; font-size:1.2rem; color:#999; margin-top:20px;">No destinations found matching your search.</p>`;
                return;
            }

            // Cards create karein
            placesList.forEach(place => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="card-img" src="${place.img}" alt="${place.name}" loading="lazy">
                    <div class="card-content">
                        <span class="card-tag">${place.country}</span>
                        <h3 class="card-title">${place.name}</h3>
                        <p class="card-desc">${place.desc}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Instant Search Filter Function
        function filterPlaces() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allPlaces.filter(place => {
                return place.name.toLowerCase().includes(query) || 
                       place.country.toLowerCase().includes(query);
            });
            
            displayPlaces(filtered);
        }

        // Initial Load: Pehli baar page khulne par data load karein
        window.onload = () => {
            displayPlaces(allPlaces);
        };
    </script>
</body>
</html>
